<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>勾股定理拼图证明</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px}
h1{font-size:1.5rem;margin-bottom:4px;color:#4ade80}
.subtitle{font-size:.85rem;color:#94a3b8;margin-bottom:16px}
.canvas-wrap{background:#1e293b;border-radius:12px;padding:8px;box-shadow:0 4px 24px rgba(0,0,0,.4)}
canvas{display:block;border-radius:8px}
.controls{margin-top:16px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;justify-content:center}
button{background:#1e3a5f;color:#60a5fa;border:1px solid #334155;border-radius:8px;padding:8px 20px;font-size:.9rem;cursor:pointer;transition:all .2s}
button:hover{background:#2563eb;color:#fff;border-color:#3b82f6}
.step-info{background:#1e293b;border-radius:8px;padding:12px 20px;margin-top:14px;max-width:600px;text-align:center;line-height:1.8;font-size:.9rem}
.step-info .highlight{color:#fbbf24;font-weight:700}
.step-info .formula{color:#4ade80;font-size:1.1rem;font-weight:700;margin-top:6px}
.progress{display:flex;gap:6px;margin-top:12px;justify-content:center}
.dot{width:12px;height:12px;border-radius:50%;background:#334155;transition:all .3s}
.dot.active{background:#4ade80}
.legend{margin-top:14px;display:flex;gap:16px;flex-wrap:wrap;justify-content:center;font-size:.8rem}
.legend-item{display:flex;align-items:center;gap:4px}
.legend-color{width:14px;height:14px;border-radius:3px}
</style>
</head>
<body>
<h1>🧩 勾股定理"拼图证明"</h1>
<p class="subtitle">看动画把"数"和"形"焊在一起，再也忘不了 a² + b² = c²</p>
<div class="canvas-wrap"><canvas id="cv" width="600" height="440"></canvas></div>
<div class="controls">
  <button id="btnPrev">⬅ 上一步</button>
  <button id="btnPlay">▶ 自动播放</button>
  <button id="btnNext">下一步 ➡</button>
  <button id="btnReset">🔄 重置</button>
</div>
<div class="progress" id="dots"></div>
<div class="step-info" id="stepInfo">点击"下一步"开始动画演示</div>
<div class="legend">
  <div class="legend-item"><div class="legend-color" style="background:#f87171"></div>直角三角形 (面积 = ½ab)</div>
  <div class="legend-item"><div class="legend-color" style="background:#60a5fa"></div>边长 a 的正方形 (面积 = a²)</div>
  <div class="legend-item"><div class="legend-color" style="background:#4ade80"></div>边长 b 的正方形 (面积 = b²)</div>
  <div class="legend-item"><div class="legend-color" style="background:#fbbf24"></div>边长 c 的正方形 (面积 = c²)</div>
</div>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const W=600,H=440;
const a=3,b=4,c=5; // classic 3-4-5 triangle
const S=28; // scale factor

// Steps definition
const steps=[
  {text:'第一步：画一个直角边为 <span class="highlight">a=3</span>、<span class="highlight">b=4</span>，斜边为 <span class="highlight">c=5</span> 的直角三角形',formula:''},
  {text:'第二步：用 <span class="highlight">4个全等直角三角形</span> 拼成大正方形（左边）',formula:'大正方形边长 = a + b = 7'},
  {text:'第三步：中间空出的区域是一个 <span class="highlight">边长为 c 的正方形</span>',formula:'空白面积 = c² = 25'},
  {text:'第四步：同样的4个三角形，换个摆法（右边），中间空出 <span class="highlight">a² + b²</span> 两个正方形',formula:'空白面积 = a² + b² = 9 + 16 = 25'},
  {text:'第五步：两种摆法，<span class="highlight">大正方形面积相同</span>，三角形面积相同，所以空白面积相等！',formula:'c² = a² + b² → 25 = 25 ✅'},
];

let curStep=0,playing=false,playTimer=null;
const dotsEl=document.getElementById('dots');
steps.forEach((_,i)=>{const d=document.createElement('div');d.className='dot';dotsEl.appendChild(d);});

function drawStep(n){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#0f172a';ctx.fillRect(0,0,W,H);
  const cx1=150,cx2=450,cy=200;

  // always draw triangle reference
  if(n===0){
    drawSingleTriangle(cx1,cy);
    // labels
    ctx.fillStyle='#f87171';ctx.font='bold 16px sans-serif';ctx.textAlign='center';
    ctx.fillText('直角三角形',cx1,cy+130);
    ctx.fillStyle='#60a5fa';ctx.fillText('a = 3',cx1-40,cy+20);
    ctx.fillStyle='#4ade80';ctx.fillText('b = 4',cx1+20,cy+50);
    ctx.fillStyle='#fbbf24';ctx.fillText('c = 5',cx1-25,cy-40);
  }
  if(n>=1){
    drawLeftLayout(cx1,cy,n);
    ctx.fillStyle='#94a3b8';ctx.font='13px sans-serif';ctx.textAlign='center';
    ctx.fillText('摆法一',cx1,cy+150);
  }
  if(n>=3){
    drawRightLayout(cx2,cy,n);
    ctx.fillStyle='#94a3b8';ctx.font='13px sans-serif';ctx.textAlign='center';
    ctx.fillText('摆法二',cx2,cy+150);
  }
  if(n===4){
    // equal sign
    ctx.fillStyle='#fbbf24';ctx.font='bold 36px sans-serif';ctx.textAlign='center';
    ctx.fillText('=',300,cy+10);
    // conclusion box
    ctx.fillStyle='#1e3a5f';ctx.strokeStyle='#3b82f6';ctx.lineWidth=2;
    roundRect(ctx,120,360,360,60,8);ctx.fill();ctx.stroke();
    ctx.fillStyle='#fbbf24';ctx.font='bold 20px sans-serif';ctx.textAlign='center';
    ctx.fillText('c² = a² + b²  ⟹  25 = 9 + 16 ✅',300,396);
  }
  // update dots & info
  document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i<=n));
  document.getElementById('stepInfo').innerHTML=steps[n].text+`<div class="formula">${steps[n].formula}</div>`;
}

function drawSingleTriangle(cx,cy){
  ctx.save();ctx.translate(cx-2*S,cy-S);
  ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(b*S,0);ctx.lineTo(0,a*S);ctx.closePath();
  ctx.fillStyle='#f87171';ctx.globalAlpha=0.7;ctx.fill();ctx.globalAlpha=1;
  ctx.strokeStyle='#f87171';ctx.lineWidth=2;ctx.stroke();
  // right angle mark
  ctx.strokeStyle='#fff';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(10,0);ctx.lineTo(10,10);ctx.lineTo(0,10);ctx.stroke();
  ctx.restore();
}

function drawLeftLayout(cx,cy){
  ctx.save();ctx.translate(cx-3.5*S,cy-3.5*S);
  const T=a*S; // triangle short leg
  const U=b*S; // triangle long leg
  // 4 triangles around c-square
  const triColor='#f87171';const cSquareColor='#fbbf24';
  // top-left triangle
  drawTri(ctx,0,0, T,0, 0,U, triColor);
  // top-right triangle
  drawTri(ctx,T,0, T+U,0, T,T, triColor);
  // bottom-right triangle
  drawTri(ctx,T+U,T, T+U,T+U, T,T+U, triColor);
  // bottom-left triangle
  drawTri(ctx,0,U, T,U+T, 0,T+U, triColor);
  // c-square in center
  ctx.fillStyle=cSquareColor;ctx.globalAlpha=0.35;
  ctx.fillRect(T,U,T,T);ctx.globalAlpha=1;
  ctx.strokeStyle=cSquareColor;ctx.lineWidth=2;ctx.setLineDash([4,4]);
  ctx.strokeRect(T,U,T,T);ctx.setLineDash([]);
  // label
  ctx.fillStyle=cSquareColor;ctx.font='bold 18px sans-serif';ctx.textAlign='center';
  ctx.fillText('c²',T+T/2,U+T/2+6);
  ctx.restore();
}

function drawRightLayout(cx,cy){
  ctx.save();ctx.translate(cx-3.5*S,cy-3.5*S);
  const T=a*S,U=b*S;
  // arrangement: 2 triangles on top, 2 on bottom, a²+b² squares in middle
  // top-left triangle
  drawTri(ctx,0,0, U,0, 0,T, '#f87171');
  // top-right triangle
  drawTri(ctx,U,0, U+T,0, U,T, '#fb923c');
  // bottom-left triangle
  drawTri(ctx,0,T, U,T+U, 0,T+U, '#fb923c');
  // bottom-right triangle
  drawTri(ctx,U+T,T, U+T,T+U, U,T+U, '#f87171');
  // a² square
  ctx.fillStyle='#60a5fa';ctx.globalAlpha=0.4;
  ctx.fillRect(U,0,T,T);ctx.globalAlpha=1;
  ctx.strokeStyle='#60a5fa';ctx.lineWidth=2;
  ctx.strokeRect(U,0,T,T);
  ctx.fillStyle='#60a5fa';ctx.font='bold 16px sans-serif';ctx.textAlign='center';
  ctx.fillText('a²',U+T/2,T/2+6);
  // b² square
  ctx.fillStyle='#4ade80';ctx.globalAlpha=0.4;
  ctx.fillRect(0,T,U,U);ctx.globalAlpha=1;
  ctx.strokeStyle='#4ade80';ctx.lineWidth=2;
  ctx.strokeRect(0,T,U,U);
  ctx.fillStyle='#4ade80';ctx.font='bold 16px sans-serif';ctx.textAlign='center';
  ctx.fillText('b²',U/2,T+U/2+6);
  ctx.restore();
}

function drawTri(ctx,x1,y1,x2,y2,x3,y3,color){
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.lineTo(x3,y3);ctx.closePath();
  ctx.fillStyle=color;ctx.globalAlpha=0.55;ctx.fill();ctx.globalAlpha=1;
  ctx.strokeStyle=color;ctx.lineWidth=1.5;ctx.stroke();
}

function roundRect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}

document.getElementById('btnNext').onclick=()=>{if(curStep<steps.length-1){curStep++;drawStep(curStep);}};
document.getElementById('btnPrev').onclick=()=>{if(curStep>0){curStep--;drawStep(curStep);}};
document.getElementById('btnReset').onclick=()=>{curStep=0;stopPlay();drawStep(0);};
document.getElementById('btnPlay').onclick=()=>{
  if(playing){stopPlay();}else{playing=true;document.getElementById('btnPlay').textContent='⏸ 暂停';curStep=0;drawStep(0);playTimer=setInterval(()=>{if(curStep<steps.length-1){curStep++;drawStep(curStep);}else{stopPlay();}},2000);}
};
function stopPlay(){playing=false;clearInterval(playTimer);document.getElementById('btnPlay').textContent='▶ 自动播放';}
drawStep(0);
</script>
</body>
</html>
