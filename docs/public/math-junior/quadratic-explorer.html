<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>动态二次函数探索器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px}
h1{font-size:1.5rem;margin-bottom:4px;color:#60a5fa}
.subtitle{font-size:.85rem;color:#94a3b8;margin-bottom:16px}
.canvas-wrap{background:#1e293b;border-radius:12px;padding:8px;box-shadow:0 4px 24px rgba(0,0,0,.4)}
canvas{display:block;border-radius:8px}
.controls{display:flex;gap:20px;margin-top:16px;flex-wrap:wrap;justify-content:center}
.slider-group{display:flex;flex-direction:column;align-items:center;gap:4px}
.slider-group label{font-size:.85rem;color:#94a3b8}
.slider-group .val{font-size:1.1rem;font-weight:700;color:#f1f5f9;min-width:50px;text-align:center}
input[type=range]{-webkit-appearance:none;width:180px;height:6px;border-radius:3px;background:#334155;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;cursor:pointer}
#sliderA::-webkit-slider-thumb{background:#f87171}
#sliderB::-webkit-slider-thumb{background:#4ade80}
#sliderC::-webkit-slider-thumb{background:#60a5fa}
.info{margin-top:14px;display:flex;gap:24px;flex-wrap:wrap;justify-content:center}
.info-card{background:#1e293b;border-radius:8px;padding:10px 16px;text-align:center;min-width:120px}
.info-card .lbl{font-size:.75rem;color:#64748b;margin-bottom:2px}
.info-card .num{font-size:1rem;font-weight:600;color:#fbbf24}
.hint{margin-top:14px;font-size:.8rem;color:#64748b;max-width:600px;text-align:center;line-height:1.6}
.tag{display:inline-block;background:#1e3a5f;color:#60a5fa;border-radius:4px;padding:2px 8px;font-size:.75rem;margin:2px}
</style>
</head>
<body>
<h1>🎯 动态二次函数探索器</h1>
<p class="subtitle">拖动滑块，5分钟自己总结出 a、b、c 对图像的影响规律</p>
<div class="canvas-wrap"><canvas id="cv" width="600" height="400"></canvas></div>
<div class="controls">
  <div class="slider-group">
    <label>a（开口方向与宽窄）</label>
    <input type="range" id="sliderA" min="-3" max="3" step="0.1" value="1">
    <span class="val" id="valA">1.0</span>
  </div>
  <div class="slider-group">
    <label>b（对称轴位置）</label>
    <input type="range" id="sliderB" min="-6" max="6" step="0.1" value="0">
    <span class="val" id="valB">0.0</span>
  </div>
  <div class="slider-group">
    <label>c（上下平移）</label>
    <input type="range" id="sliderC" min="-5" max="5" step="0.1" value="0">
    <span class="val" id="valC">0.0</span>
  </div>
</div>
<div class="info">
  <div class="info-card"><div class="lbl">解析式</div><div class="num" id="formula">y = x²</div></div>
  <div class="info-card"><div class="lbl">顶点坐标</div><div class="num" id="vertex">(0, 0)</div></div>
  <div class="info-card"><div class="lbl">对称轴</div><div class="num" id="axis">x = 0</div></div>
  <div class="info-card"><div class="lbl">与y轴交点</div><div class="num" id="yint">(0, 0)</div></div>
</div>
<div class="hint">
  <span class="tag">a&gt;0 开口向上</span><span class="tag">a&lt;0 开口向下</span><span class="tag">|a|越大开口越窄</span><span class="tag">对称轴 x = -b/(2a)</span><span class="tag">c 决定与y轴交点</span>
</div>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const W=600,H=400,OX=W/2,OY=H/2,SCALE=30;
function draw(){
  const a=+document.getElementById('sliderA').value;
  const b=+document.getElementById('sliderB').value;
  const c=+document.getElementById('sliderC').value;
  ctx.clearRect(0,0,W,H);
  // grid
  ctx.strokeStyle='#334155';ctx.lineWidth=0.5;
  for(let i=-10;i<=10;i++){const x=OX+i*SCALE;ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let i=-7;i<=7;i++){const y=OY-i*SCALE;ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  // axes
  ctx.strokeStyle='#64748b';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(0,OY);ctx.lineTo(W,OY);ctx.stroke();
  ctx.beginPath();ctx.moveTo(OX,0);ctx.lineTo(OX,H);ctx.stroke();
  // axis labels
  ctx.fillStyle='#64748b';ctx.font='11px sans-serif';ctx.textAlign='center';
  for(let i=-9;i<=9;i++){if(i===0)continue;ctx.fillText(i,OX+i*SCALE,OY+14);}
  ctx.textAlign='right';
  for(let i=-6;i<=6;i++){if(i===0)continue;ctx.fillText(i,OX-6,OY-i*SCALE+4);}
  // parabola
  if(Math.abs(a)<0.01){ctx.strokeStyle='#60a5fa';ctx.lineWidth=2;ctx.beginPath();const px=-OX/SCALE;ctx.moveTo(0,OY-(b*px+c)*SCALE);for(let sx=1;sx<=W;sx++){const x2=(sx-OX)/SCALE;const y2=b*x2+c;ctx.lineTo(sx,OY-y2*SCALE);}ctx.stroke();}
  else{
    const vx=-b/(2*a),vy=a*vx*vx+b*vx+c;
    ctx.strokeStyle='#f87171';ctx.lineWidth=2.5;ctx.beginPath();
    let first=true;
    for(let sx=0;sx<=W;sx++){
      const x=(sx-OX)/SCALE;
      const y=a*x*x+b*x+c;
      const sy=OY-y*SCALE;
      if(sy<-100||sy>H+100){first=true;continue;}
      if(first){ctx.moveTo(sx,sy);first=false;}else{ctx.lineTo(sx,sy);}
    }
    ctx.stroke();
    // vertex
    const svx=OX+vx*SCALE,svy=OY-vy*SCALE;
    ctx.fillStyle='#fbbf24';ctx.beginPath();ctx.arc(svx,svy,5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fbbf24';ctx.font='12px sans-serif';ctx.textAlign='left';
    ctx.fillText(`(${vx.toFixed(1)}, ${vy.toFixed(1)})`,svx+8,svy-8);
    // axis of symmetry
    ctx.strokeStyle='#4ade80';ctx.lineWidth=1;ctx.setLineDash([4,4]);
    ctx.beginPath();ctx.moveTo(svx,0);ctx.lineTo(svx,H);ctx.stroke();ctx.setLineDash([]);
  }
  // y-intercept
  const yiy=OY-c*SCALE;
  ctx.fillStyle='#60a5fa';ctx.beginPath();ctx.arc(OX,yiy,4,0,Math.PI*2);ctx.fill();
  // update info
  const as=a.toFixed(1),bs=b.toFixed(1),cs=c.toFixed(1);
  let formula='y = ';
  if(Math.abs(a)<0.01){formula+=bs+'!==0'?`${bs}x + ${cs}`:`${cs}`;}
  else{
    if(a===1)formula+='x²';else if(a===-1)formula+='-x²';else formula+=as+'x²';
    if(b>0)formula+=' + '+bs+'x';else if(b<0)formula+=' - '+(-b).toFixed(1)+'x';
    if(c>0)formula+=' + '+cs;else if(c<0)formula+=' - '+(-c).toFixed(1);
  }
  document.getElementById('formula').textContent=formula;
  if(Math.abs(a)>=0.01){
    const vx=-b/(2*a),vy=a*vx*vx+b*vx+c;
    document.getElementById('vertex').textContent=`(${vx.toFixed(2)}, ${vy.toFixed(2)})`;
    document.getElementById('axis').textContent=`x = ${vx.toFixed(2)}`;
  }else{
    document.getElementById('vertex').textContent='无（直线）';
    document.getElementById('axis').textContent='无';
  }
  document.getElementById('yint').textContent=`(0, ${cs})`;
}
document.querySelectorAll('input[type=range]').forEach(s=>s.addEventListener('input',draw));
draw();
</script>
</body>
</html>
