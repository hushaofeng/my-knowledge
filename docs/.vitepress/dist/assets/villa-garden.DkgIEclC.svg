<svg viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg">
  <!-- 动漫风格渐变定义 -->
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5DADE2"/>
      <stop offset="100%" style="stop-color:#AED6F1"/>
    </linearGradient>
    <linearGradient id="grass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#58D68D"/>
      <stop offset="100%" style="stop-color:#27AE60"/>
    </linearGradient>
    <linearGradient id="pool" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5DADE2"/>
      <stop offset="100%" style="stop-color:#2E86AB"/>
    </linearGradient>
    <linearGradient id="roof" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E74C3C"/>
      <stop offset="100%" style="stop-color:#C0392B"/>
    </linearGradient>
  </defs>
  
  <!-- 天空背景（更大） -->
  <rect x="0" y="0" width="900" height="380" fill="url(#sky)"/>
  
  <!-- 太阳（动漫风格） -->
  <circle cx="800" cy="80" r="55" fill="#F1C40F" stroke="#E67E22" stroke-width="3"/>
  <circle cx="800" cy="80" r="48" fill="#F4D03F"/>
  <!-- 太阳光芒 -->
  <g stroke="#F1C40F" stroke-width="5" stroke-linecap="round">
    <line x1="800" y1="15" x2="800" y2="-5"/>
    <line x1="865" y1="80" x2="885" y2="80"/>
    <line x1="735" y1="80" x2="715" y2="80"/>
    <line x1="855" y1="25" x2="870" y2="10"/>
    <line x1="745" y1="25" x2="730" y2="10"/>
    <line x1="855" y1="135" x2="870" y2="150"/>
    <line x1="745" y1="135" x2="730" y2="150"/>
  </g>
  
  <!-- 云朵（动漫风格 fluffy，更多更大） -->
  <g fill="white" stroke="#D5DBDB" stroke-width="2">
    <ellipse cx="80" cy="90" rx="45" ry="28"/>
    <ellipse cx="130" cy="78" rx="40" ry="25"/>
    <ellipse cx="175" cy="95" rx="35" ry="22"/>
    <ellipse cx="110" cy="105" rx="30" ry="20"/>
    
    <ellipse cx="400" cy="60" rx="55" ry="35"/>
    <ellipse cx="460" cy="48" rx="48" ry="30"/>
    <ellipse cx="510" cy="68" rx="40" ry="25"/>
    <ellipse cx="440" cy="82" rx="35" ry="22"/>
    
    <ellipse cx="650" cy="100" rx="42" ry="26"/>
    <ellipse cx="700" cy="88" rx="38" ry="24"/>
    <ellipse cx="745" cy="102" rx="32" ry="20"/>
  </g>
  
  <!-- 整体草地背景（前后院衔接） -->
  <rect x="0" y="220" width="900" height="380" fill="url(#grass)"/>
  
  <!-- 后院的树（动漫风格） -->
  <g>
    <!-- 树1 左后 -->
    <rect x="45" y="225" width="22" height="45" fill="#8B4513" stroke="#5D3A1A" stroke-width="2"/>
    <ellipse cx="56" cy="195" rx="48" ry="55" fill="#2ECC71" stroke="#27AE60" stroke-width="3"/>
    <ellipse cx="40" cy="215" rx="28" ry="32" fill="#58D68D"/>
    <ellipse cx="75" cy="208" rx="25" ry="28" fill="#58D68D"/>
    
    <!-- 树2 右后 -->
    <rect x="820" y="230" width="20" height="40" fill="#8B4513" stroke="#5D3A1A" stroke-width="2"/>
    <ellipse cx="830" cy="200" rx="45" ry="50" fill="#2ECC71" stroke="#27AE60" stroke-width="3"/>
    <ellipse cx="815" cy="218" rx="25" ry="28" fill="#58D68D"/>
    <ellipse cx="848" cy="212" rx="22" ry="25" fill="#58D68D"/>
  </g>
  
  <!-- 别墅主体（动漫风格） -->
  <rect x="230" y="250" width="430" height="175" fill="#FDEBD0" stroke="#D4AC0D" stroke-width="4"/>
  
  <!-- 屋顶（动漫红色屋顶） -->
  <polygon points="195,250 445,110 695,250" fill="url(#roof)" stroke="#C0392B" stroke-width="4"/>
  <polygon points="230,250 445,135 660,250" fill="#EC7063"/>
  
  <!-- 烟囱 -->
  <rect x="530" y="130" width="42" height="85" fill="#E74C3C" stroke="#C0392B" stroke-width="3"/>
  <rect x="525" y="125" width="52" height="15" fill="#C0392B"/>
  
  <!-- 窗户（动漫风格蓝色反光） -->
  <g>
    <!-- 左下窗 -->
    <rect x="260" y="295" width="78" height="62" fill="#AED6F1" stroke="#5D4037" stroke-width="4" rx="5"/>
    <line x1="299" y1="295" x2="299" y2="357" stroke="#5D4037" stroke-width="3"/>
    <line x1="260" y1="326" x2="338" y2="326" stroke="#5D4037" stroke-width="3"/>
    <rect x="265" y="300" width="16" height="13" fill="white" opacity="0.6"/>
    
    <!-- 右下窗 -->
    <rect x="555" y="295" width="78" height="62" fill="#AED6F1" stroke="#5D4037" stroke-width="4" rx="5"/>
    <line x1="594" y1="295" x2="594" y2="357" stroke="#5D4037" stroke-width="3"/>
    <line x1="555" y1="326" x2="633" y2="326" stroke="#5D4037" stroke-width="3"/>
    <rect x="560" y="300" width="16" height="13" fill="white" opacity="0.6"/>
    
    <!-- 楼上窗 -->
    <rect x="408" y="185" width="78" height="58" fill="#AED6F1" stroke="#5D4037" stroke-width="4" rx="5"/>
    <line x1="447" y1="185" x2="447" y2="243" stroke="#5D4037" stroke-width="3"/>
    <line x1="408" y1="214" x2="486" y2="214" stroke="#5D4037" stroke-width="3"/>
    <rect x="413" y="190" width="16" height="13" fill="white" opacity="0.6"/>
  </g>
  
  <!-- 门（动漫风格） -->
  <rect x="405" y="365" width="85" height="85" fill="#8B4513" stroke="#5D3A1A" stroke-width="4" rx="5"/>
  <circle cx="475" cy="415" r="8" fill="#F1C40F" stroke="#E67E22" stroke-width="2"/>
  <rect x="413" y="373" width="70" height="38" fill="#A0522D" rx="3"/>
  
  <!-- 车道 -->
  <path d="M405 425 L405 600 L495 600 L495 425" fill="#95A5A6" stroke="#7F8C8D" stroke-width="2"/>
  <line x1="450" y1="445" x2="450" y2="600" stroke="#F5F5F5" stroke-width="4" stroke-dasharray="30,15"/>
  
  <!-- 游泳池（动漫风格） -->
  <rect x="40" y="480" width="170" height="90" rx="15" fill="url(#pool)" stroke="#2471A3" stroke-width="4"/>
  <!-- 泳池水波纹 -->
  <path d="M55 500 Q95 492 135 500 Q175 508 205 500" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="4"/>
  <path d="M55 525 Q95 517 135 525 Q175 533 205 525" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="3"/>
  <path d="M55 550 Q95 542 135 550 Q175 558 205 550" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  
  <!-- 围栏（在游泳池前面） -->
  <g fill="#DEB887" stroke="#8B4513" stroke-width="2">
    <!-- 围栏立柱 -->
    <rect x="35" y="450" width="12" height="70"/>
    <rect x="65" y="450" width="12" height="70"/>
    <rect x="95" y="450" width="12" height="70"/>
    <rect x="125" y="450" width="12" height="70"/>
    <rect x="155" y="450" width="12" height="70"/>
    <rect x="185" y="450" width="12" height="70"/>
    <rect x="215" y="450" width="12" height="70"/>
    <!-- 横梁 -->
    <rect x="35" y="465" width="195" height="12" fill="#D2691E"/>
    <rect x="35" y="500" width="195" height="12" fill="#D2691E"/>
  </g>
  
  <!-- 围栏尖顶装饰 -->
  <g fill="#D2691E">
    <polygon points="41,450 47,432 53,450"/>
    <polygon points="71,450 77,432 83,450"/>
    <polygon points="101,450 107,432 113,450"/>
    <polygon points="131,450 137,432 143,450"/>
    <polygon points="161,450 167,432 173,450"/>
    <polygon points="191,450 197,432 203,450"/>
    <polygon points="221,450 227,432 233,450"/>
  </g>
  
  <!-- 左侧花坛（动漫风格彩色花朵） -->
  <rect x="250" y="440" width="100" height="15" fill="#8B4513" stroke="#5D3A1A" stroke-width="2"/>
  <circle cx="270" cy="432" r="16" fill="#E74C3C" stroke="#C0392B" stroke-width="2"/>
  <circle cx="300" cy="425" r="18" fill="#F39C12" stroke="#D68910" stroke-width="2"/>
  <circle cx="332" cy="430" r="15" fill="#9B59B6" stroke="#7D3C98" stroke-width="2"/>
  <circle cx="285" cy="418" r="13" fill="#E91E63" stroke="#AD1457" stroke-width="2"/>
  <circle cx="318" cy="422" r="14" fill="#F1C40F" stroke="#D4AC0D" stroke-width="2"/>
  
  <!-- 右侧花坛 -->
  <rect x="560" y="440" width="100" height="15" fill="#8B4513" stroke="#5D3A1A" stroke-width="2"/>
  <circle cx="580" cy="430" r="15" fill="#E74C3C" stroke="#C0392B" stroke-width="2"/>
  <circle cx="612" cy="423" r="18" fill="#3498DB" stroke="#2980B9" stroke-width="2"/>
  <circle cx="645" cy="428" r="16" fill="#F39C12" stroke="#D68910" stroke-width="2"/>
  <circle cx="596" cy="435" r="12" fill="#F1C40F" stroke="#D4AC0D" stroke-width="2"/>
  <circle cx="628" cy="418" r="14" fill="#9B59B6" stroke="#7D3C98" stroke-width="2"/>
  
  <!-- 前院左树 -->
  <rect x="355" y="480" width="25" height="65" fill="#8B4513" stroke="#5D3A1A" stroke-width="2"/>
  <ellipse cx="367" cy="438" rx="52" ry="62" fill="#2ECC71" stroke="#27AE60" stroke-width="3"/>
  <ellipse cx="350" cy="460" rx="32" ry="38" fill="#58D68D"/>
  <ellipse cx="390" cy="455" rx="28" ry="33" fill="#58D68D"/>
  
  <!-- 前院右树 -->
  <rect x="595" y="485" width="22" height="60" fill="#8B4513" stroke="#5D3A1A" stroke-width="2"/>
  <ellipse cx="606" cy="445" rx="48" ry="58" fill="#2ECC71" stroke="#27AE60" stroke-width="3"/>
  <ellipse cx="588" cy="468" rx="30" ry="35" fill="#58D68D"/>
  <ellipse cx="628" cy="460" rx="26" ry="32" fill="#58D68D"/>
  
  <!-- 泳池边的躺椅（动漫风格） -->
  <rect x="225" y="500" width="55" height="32" fill="#E74C3C" stroke="#C0392B" stroke-width="2" rx="3"/>
  <rect x="225" y="532" width="55" height="14" fill="#C0392B" rx="2"/>
  
  <!-- 小鸟（动漫风格） -->
  <g fill="#2C3E50">
    <ellipse cx="120" cy="150" rx="14" ry="9"/>
    <circle cx="132" cy="148" r="6" fill="#2C3E50"/>
    <polygon points="138,148 150,145 138,143" fill="#F39C12"/>
    <path d="M112 158 Q100 170 106 178" stroke="#2C3E50" stroke-width="2" fill="none"/>
    
    <ellipse cx="170" cy="130" rx="12" ry="8"/>
    <circle cx="180" cy="128" r="5" fill="#2C3E50"/>
    <polygon points="185,128 195,126 185,124" fill="#F39C12"/>
  </g>
  
  <!-- 标题 -->
  <text x="450" y="590" text-anchor="middle" font-family="Comic Sans MS, cursive, sans-serif" font-size="22" fill="#2C3E50" font-weight="bold">动漫风格的别墅花园</text>
</svg>