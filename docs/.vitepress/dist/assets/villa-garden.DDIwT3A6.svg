<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- 动漫风格渐变定义 -->
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5DADE2"/>
      <stop offset="100%" style="stop-color:#AED6F1"/>
    </linearGradient>
    <linearGradient id="grass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#58D68D"/>
      <stop offset="100%" style="stop-color:#27AE60"/>
    </linearGradient>
    <linearGradient id="pool" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5DADE2"/>
      <stop offset="100%" style="stop-color:#2E86AB"/>
    </linearGradient>
    <linearGradient id="roof" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E74C3C"/>
      <stop offset="100%" style="stop-color:#C0392B"/>
    </linearGradient>
  </defs>
  
  <!-- 天空背景 -->
  <rect x="0" y="0" width="900" height="350" fill="url(#sky)"/>
  
  <!-- 太阳（动漫风格） -->
  <circle cx="800" cy="70" r="50" fill="#F1C40F" stroke="#E67E22" stroke-width="3"/>
  <circle cx="800" cy="70" r="42" fill="#F4D03F"/>
  <!-- 太阳光芒 -->
  <g stroke="#F1C40F" stroke-width="4" stroke-linecap="round">
    <line x1="800" y1="10" x2="800" y2="-5"/>
    <line x1="860" y1="70" x2="875" y2="70"/>
    <line x1="740" y1="70" x2="725" y2="70"/>
    <line x1="850" y1="20" x2="860" y2="10"/>
    <line x1="750" y1="20" x2="740" y2="10"/>
    <line x1="850" y1="120" x2="860" y2="130"/>
    <line x1="750" y1="120" x2="740" y2="130"/>
  </g>
  
  <!-- 云朵（动漫风格 fluffy） -->
  <g fill="white" stroke="#D5DBDB" stroke-width="2">
    <ellipse cx="100" cy="80" rx="40" ry="25"/>
    <ellipse cx="145" cy="70" rx="35" ry="22"/>
    <ellipse cx="180" cy="85" rx="30" ry="20"/>
    <ellipse cx="130" cy="90" rx="25" ry="18"/>
    
    <ellipse cx="550" cy="55" rx="45" ry="28"/>
    <ellipse cx="600" cy="45" rx="38" ry="24"/>
    <ellipse cx="640" cy="60" rx="32" ry="20"/>
    <ellipse cx="580" cy="70" rx="28" ry="18"/>
  </g>
  
  <!-- 后院草地（上方） -->
  <rect x="0" y="160" width="900" height="60" fill="url(#grass)"/>
  
  <!-- 后院的树（动漫风格） -->
  <g>
    <!-- 树1 左后 -->
    <rect x="55" y="165" width="20" height="40" fill="#8B4513" stroke="#5D3A1A" stroke-width="2"/>
    <ellipse cx="65" cy="140" rx="45" ry="50" fill="#2ECC71" stroke="#27AE60" stroke-width="3"/>
    <ellipse cx="50" cy="155" rx="25" ry="28" fill="#58D68D"/>
    <ellipse cx="80" cy="150" rx="22" ry="25" fill="#58D68D"/>
    
    <!-- 树2 右后 -->
    <rect x="820" y="170" width="18" height="35" fill="#8B4513" stroke="#5D3A1A" stroke-width="2"/>
    <ellipse cx="829" cy="145" rx="40" ry="45" fill="#2ECC71" stroke="#27AE60" stroke-width="3"/>
    <ellipse cx="815" cy="158" rx="22" ry="25" fill="#58D68D"/>
    <ellipse cx="845" cy="155" rx="20" ry="22" fill="#58D68D"/>
  </g>
  
  <!-- 别墅主体（动漫风格） -->
  <rect x="230" y="190" width="420" height="170" fill="#FDEBD0" stroke="#D4AC0D" stroke-width="4"/>
  
  <!-- 屋顶（动漫红色屋顶） -->
  <polygon points="200,190 440,60 680,190" fill="url(#roof)" stroke="#C0392B" stroke-width="4"/>
  <polygon points="230,190 440,85 650,190" fill="#EC7063"/>
  
  <!-- 烟囱 -->
  <rect x="520" y="80" width="40" height="80" fill="#E74C3C" stroke="#C0392B" stroke-width="3"/>
  <rect x="515" y="75" width="50" height="15" fill="#C0392B"/>
  
  <!-- 窗户（动漫风格蓝色反光） -->
  <g>
    <!-- 左下窗 -->
    <rect x="260" y="230" width="75" height="60" fill="#AED6F1" stroke="#5D4037" stroke-width="4" rx="5"/>
    <line x1="297" y1="230" x2="297" y2="290" stroke="#5D4037" stroke-width="3"/>
    <line x1="260" y1="260" x2="335" y2="260" stroke="#5D4037" stroke-width="3"/>
    <rect x="265" y="235" width="15" height="12" fill="white" opacity="0.6"/>
    
    <!-- 右下窗 -->
    <rect x="545" y="230" width="75" height="60" fill="#AED6F1" stroke="#5D4037" stroke-width="4" rx="5"/>
    <line x1="582" y1="230" x2="582" y2="290" stroke="#5D4037" stroke-width="3"/>
    <line x1="545" y1="260" x2="620" y2="260" stroke="#5D4037" stroke-width="3"/>
    <rect x="550" y="235" width="15" height="12" fill="white" opacity="0.6"/>
    
    <!-- 楼上窗 -->
    <rect x="405" y="130" width="75" height="55" fill="#AED6F1" stroke="#5D4037" stroke-width="4" rx="5"/>
    <line x1="442" y1="130" x2="442" y2="185" stroke="#5D4037" stroke-width="3"/>
    <line x1="405" y1="157" x2="480" y2="157" stroke="#5D4037" stroke-width="3"/>
    <rect x="410" y="135" width="15" height="12" fill="white" opacity="0.6"/>
  </g>
  
  <!-- 门（动漫风格） -->
  <rect x="400" y="300" width="80" height="80" fill="#8B4513" stroke="#5D3A1A" stroke-width="4" rx="5"/>
  <circle cx="465" cy="345" r="8" fill="#F1C40F" stroke="#E67E22" stroke-width="2"/>
  <rect x="408" y="308" width="65" height="35" fill="#A0522D" rx="3"/>
  
  <!-- 前院草地（下方，与后院衔接） -->
  <rect x="0" y="340" width="900" height="210" fill="url(#grass)"/>
  
  <!-- 围栏（动漫风格木栅栏） -->
  <g fill="#DEB887" stroke="#8B4513" stroke-width="2">
    <!-- 左侧围栏 -->
    <rect x="20" y="340" width="10" height="80"/>
    <rect x="45" y="340" width="10" height="80"/>
    <rect x="70" y="340" width="10" height="80"/>
    <rect x="95" y="340" width="10" height="80"/>
    <rect x="120" y="340" width="10" height="80"/>
    <rect x="145" y="340" width="10" height="80"/>
    <rect x="170" y="340" width="10" height="80"/>
    <rect x="195" y="340" width="10" height="80"/>
    <!-- 左侧横梁 -->
    <rect x="20" y="355" width="190" height="12" fill="#D2691E"/>
    <rect x="20" y="395" width="190" height="12" fill="#D2691E"/>
    
    <!-- 右侧围栏 -->
    <rect x="680" y="340" width="10" height="80"/>
    <rect x="705" y="340" width="10" height="80"/>
    <rect x="730" y="340" width="10" height="80"/>
    <rect x="755" y="340" width="10" height="80"/>
    <rect x="780" y="340" width="10" height="80"/>
    <rect x="805" y="340" width="10" height="80"/>
    <rect x="830" y="340" width="10" height="80"/>
    <rect x="855" y="340" width="10" height="80"/>
    <!-- 右侧横梁 -->
    <rect x="680" y="355" width="190" height="12" fill="#D2691E"/>
    <rect x="680" y="395" width="190" height="12" fill="#D2691E"/>
  </g>
  
  <!-- 围栏尖顶装饰 -->
  <g fill="#D2691E">
    <polygon points="25,340 30,325 35,340"/>
    <polygon points="50,340 55,325 60,340"/>
    <polygon points="75,340 80,325 85,340"/>
    <polygon points="100,340 105,325 110,340"/>
    <polygon points="125,340 130,325 135,340"/>
    <polygon points="150,340 155,325 160,340"/>
    <polygon points="175,340 180,325 185,340"/>
    <polygon points="200,340 205,325 210,340"/>
    
    <polygon points="685,340 690,325 695,340"/>
    <polygon points="710,340 715,325 720,340"/>
    <polygon points="735,340 740,325 745,340"/>
    <polygon points="760,340 765,325 770,340"/>
    <polygon points="785,340 790,325 795,340"/>
    <polygon points="810,340 815,325 820,340"/>
    <polygon points="835,340 840,325 845,340"/>
    <polygon points="860,340 865,325 870,340"/>
  </g>
  
  <!-- 车道 -->
  <path d="M400 340 L400 550 L490 550 L490 340" fill="#95A5A6" stroke="#7F8C8D" stroke-width="2"/>
  <line x1="445" y1="360" x2="445" y2="550" stroke="#F5F5F5" stroke-width="4" stroke-dasharray="30,15"/>
  
  <!-- 左侧花坛（动漫风格彩色花朵） -->
  <rect x="220" y="400" width="100" height="15" fill="#8B4513" stroke="#5D3A1A" stroke-width="2"/>
  <circle cx="240" cy="392" r="15" fill="#E74C3C" stroke="#C0392B" stroke-width="2"/>
  <circle cx="270" cy="385" r="18" fill="#F39C12" stroke="#D68910" stroke-width="2"/>
  <circle cx="300" cy="390" r="16" fill="#9B59B6" stroke="#7D3C98" stroke-width="2"/>
  <circle cx="255" cy="378" r="12" fill="#E91E63" stroke="#AD1457" stroke-width="2"/>
  <circle cx="285" cy="382" r="14" fill="#F1C40F" stroke="#D4AC0D" stroke-width="2"/>
  
  <!-- 右侧花坛 -->
  <rect x="580" y="400" width="100" height="15" fill="#8B4513" stroke="#5D3A1A" stroke-width="2"/>
  <circle cx="600" cy="390" r="15" fill="#E74C3C" stroke="#C0392B" stroke-width="2"/>
  <circle cx="630" cy="383" r="18" fill="#3498DB" stroke="#2980B9" stroke-width="2"/>
  <circle cx="660" cy="388" r="16" fill="#F39C12" stroke="#D68910" stroke-width="2"/>
  <circle cx="615" cy="395" r="12" fill="#F1C40F" stroke="#D4AC0D" stroke-width="2"/>
  <circle cx="645" cy="378" r="14" fill="#9B59B6" stroke="#7D3C98" stroke-width="2"/>
  
  <!-- 前院左树 -->
  <rect x="320" y="440" width="25" height="60" fill="#8B4513" stroke="#5D3A1A" stroke-width="2"/>
  <ellipse cx="332" cy="400" rx="50" ry="60" fill="#2ECC71" stroke="#27AE60" stroke-width="3"/>
  <ellipse cx="315" cy="420" rx="30" ry="35" fill="#58D68D"/>
  <ellipse cx="355" cy="415" rx="28" ry="32" fill="#58D68D"/>
  
  <!-- 前院右树 -->
  <rect x="560" y="445" width="22" height="55" fill="#8B4513" stroke="#5D3A1A" stroke-width="2"/>
  <ellipse cx="571" cy="408" rx="45" ry="55" fill="#2ECC71" stroke="#27AE60" stroke-width="3"/>
  <ellipse cx="555" cy="425" rx="28" ry="32" fill="#58D68D"/>
  <ellipse cx="590" cy="420" rx="25" ry="30" fill="#58D68D"/>
  
  <!-- 游泳池（动漫风格） -->
  <rect x="40" y="460" width="160" height="80" rx="15" fill="url(#pool)" stroke="#2471A3" stroke-width="4"/>
  <!-- 泳池水波纹 -->
  <path d="M55 480 Q90 472 125 480 Q160 488 195 480" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="4"/>
  <path d="M55 500 Q90 492 125 500 Q160 508 195 500" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="3"/>
  <path d="M55 520 Q90 512 125 520 Q160 528 195 520" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  
  <!-- 泳池边的躺椅（动漫风格） -->
  <rect x="210" y="480" width="50" height="30" fill="#E74C3C" stroke="#C0392B" stroke-width="2" rx="3"/>
  <rect x="210" y="510" width="50" height="12" fill="#C0392B" rx="2"/>
  
  <!-- 小鸟（动漫风格） -->
  <g fill="#2C3E50">
    <ellipse cx="140" cy="120" rx="12" ry="8"/>
    <circle cx="150" cy="118" r="5" fill="#2C3E50"/>
    <polygon points="155,118 165,116 155,115" fill="#F39C12"/>
    <path d="M135 125 Q125 135 130 140" stroke="#2C3E50" stroke-width="2" fill="none"/>
    
    <ellipse cx="180" cy="105" rx="10" ry="7"/>
    <circle cx="188" cy="103" r="4" fill="#2C3E50"/>
    <polygon points="192,103 200,101 192,100" fill="#F39C12"/>
  </g>
  
  <!-- 标题 -->
  <text x="450" y="540" text-anchor="middle" font-family="Comic Sans MS, cursive, sans-serif" font-size="22" fill="#2C3E50" font-weight="bold">动漫风格的别墅花园</text>
</svg>