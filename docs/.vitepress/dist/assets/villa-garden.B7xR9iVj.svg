<svg viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg">
  <!-- 天空背景 -->
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB"/>
      <stop offset="100%" style="stop-color:#E0F6FF"/>
    </linearGradient>
    <linearGradient id="grass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50"/>
      <stop offset="100%" style="stop-color:#2E7D32"/>
    </linearGradient>
    <linearGradient id="pool" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00BCD4"/>
      <stop offset="100%" style="stop-color:#0097A7"/>
    </linearGradient>
  </defs>
  
  <!-- 天空 -->
  <rect x="0" y="0" width="900" height="320" fill="url(#sky)"/>
  
  <!-- 太阳 -->
  <circle cx="820" cy="60" r="45" fill="#FFD54F"/>
  <circle cx="820" cy="60" r="40" fill="#FFEB3B"/>
  
  <!-- 云朵 -->
  <g fill="white" opacity="0.9">
    <ellipse cx="100" cy="80" rx="35" ry="22"/>
    <ellipse cx="135" cy="72" rx="28" ry="20"/>
    <ellipse cx="160" cy="85" rx="22" ry="16"/>
    
    <ellipse cx="550" cy="50" rx="40" ry="25"/>
    <ellipse cx="590" cy="42" rx="32" ry="20"/>
    <ellipse cx="620" cy="55" rx="25" ry="18"/>
  </g>
  
  <!-- 后院（别墅后面） -->
  <rect x="0" y="150" width="900" height="50" fill="#388E3C"/>
  
  <!-- 后院的树 -->
  <g>
    <!-- 树1 左后 -->
    <rect x="60" y="125" width="18" height="45" fill="#5D4037"/>
    <ellipse cx="69" cy="100" rx="40" ry="45" fill="#2E7D32"/>
    <ellipse cx="55" cy="118" rx="22" ry="28" fill="#388E3C"/>
    <ellipse cx="85" cy="112" rx="20" ry="25" fill="#43A047"/>
    
    <!-- 树2 右后 -->
    <rect x="820" y="130" width="15" height="40" fill="#5D4037"/>
    <ellipse cx="827" cy="105" rx="35" ry="40" fill="#2E7D32"/>
    <ellipse cx="815" cy="120" rx="20" ry="22" fill="#388E3C"/>
    <ellipse cx="842" cy="115" rx="18" ry="20" fill="#43A047"/>
  </g>
  
  <!-- 别墅主体 -->
  <rect x="250" y="180" width="400" height="160" fill="#F5F5DC" stroke="#8D6E63" stroke-width="4"/>
  
  <!-- 屋顶 -->
  <polygon points="225,180 450,70 675,180" fill="#8D6E63"/>
  <polygon points="250,180 450,95 650,180" fill="#A1887F"/>
  
  <!-- 烟囱 -->
  <rect x="530" y="90" width="35" height="70" fill="#795548"/>
  <rect x="525" y="85" width="45" height="12" fill="#6D4C41"/>
  
  <!-- 窗户 左下 -->
  <rect x="280" y="220" width="70" height="55" fill="#81D4FA" stroke="#5D4037" stroke-width="3"/>
  <line x1="315" y1="220" x2="315" y2="275" stroke="#5D4037" stroke-width="2"/>
  <line x1="280" y1="247" x2="350" y2="247" stroke="#5D4037" stroke-width="2"/>
  
  <!-- 窗户 右下 -->
  <rect x="550" y="220" width="70" height="55" fill="#81D4FA" stroke="#5D4037" stroke-width="3"/>
  <line x1="585" y1="220" x2="585" y2="275" stroke="#5D4037" stroke-width="2"/>
  <line x1="550" y1="247" x2="620" y2="247" stroke="#5D4037" stroke-width="2"/>
  
  <!-- 楼上窗户 -->
  <rect x="415" y="125" width="70" height="50" fill="#81D4FA" stroke="#5D4037" stroke-width="3"/>
  <line x1="450" y1="125" x2="450" y2="175" stroke="#5D4037" stroke-width="2"/>
  <line x1="415" y1="150" x2="485" y2="150" stroke="#5D4037" stroke-width="2"/>
  
  <!-- 门 -->
  <rect x="410" y="290" width="90" height="70" fill="#6D4C41" stroke="#4E342E" stroke-width="4"/>
  <circle cx="480" cy="330" r="6" fill="#FFD54F"/>
  
  <!-- 前院草地 -->
  <rect x="0" y="340" width="900" height="180" fill="url(#grass)"/>
  
  <!-- 车道 -->
  <path d="M410 340 L410 520 L500 520 L500 340" fill="#9E9E9E"/>
  <line x1="455" y1="360" x2="455" y2="520" stroke="white" stroke-width="3" stroke-dasharray="25,12"/>
  
  <!-- 左侧花坛 -->
  <rect x="50" y="370" width="120" height="18" fill="#795548"/>
  <circle cx="75" cy="362" r="14" fill="#E91E63"/>
  <circle cx="110" cy="355" r="16" fill="#FF9800"/>
  <circle cx="145" cy="362" r="13" fill="#9C27B0"/>
  <circle cx="92" cy="350" r="12" fill="#F44336"/>
  <circle cx="128" cy="355" r="14" fill="#FFEB3B"/>
  
  <!-- 右侧花坛 -->
  <rect x="730" y="370" width="120" height="18" fill="#795548"/>
  <circle cx="755" cy="360" r="13" fill="#E91E63"/>
  <circle cx="790" cy="353" r="15" fill="#2196F3"/>
  <circle cx="825" cy="360" r="14" fill="#FF9800"/>
  <circle cx="772" cy="365" r="11" fill="#FFEB3B"/>
  <circle cx="808" cy="358" r="12" fill="#9C27B0"/>
  
  <!-- 前院左树 -->
  <rect x="180" y="400" width="22" height="55" fill="#5D4037"/>
  <ellipse cx="191" cy="365" rx="45" ry="55" fill="#2E7D32"/>
  <ellipse cx="175" cy="388" rx="28" ry="35" fill="#388E3C"/>
  <ellipse cx="210" cy="380" rx="25" ry="30" fill="#43A047"/>
  
  <!-- 前院右树 -->
  <rect x="680" y="408" width="20" height="50" fill="#5D4037"/>
  <ellipse cx="690" cy="375" rx="42" ry="50" fill="#2E7D32"/>
  <ellipse cx="673" cy="395" rx="25" ry="28" fill="#388E3C"/>
  <ellipse cx="710" cy="388" rx="22" ry="25" fill="#43A047"/>
  
  <!-- 游泳池 -->
  <rect x="60" y="440" width="200" height="75" rx="12" fill="url(#pool)" stroke="#00838F" stroke-width="4"/>
  <!-- 泳池水波纹 -->
  <path d="M70 460 Q105 453 140 460 Q175 467 210 460 Q245 453 260 460" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="3"/>
  <path d="M70 480 Q105 473 140 480 Q175 487 210 480 Q245 473 260 480" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <path d="M70 500 Q105 493 140 500 Q175 507 210 500 Q245 493 260 500" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  
  <!-- 泳池边的躺椅 -->
  <rect x="270" y="455" width="45" height="25" fill="#FF5722" rx="3"/>
  <rect x="270" y="480" width="45" height="10" fill="#E64A19" rx="3"/>
  
  <!-- 小鸟 -->
  <g fill="#424242">
    <path d="M160 110 Q175 103 190 110 Q175 106 160 110"/>
    <path d="M200 95 Q215 88 230 95 Q215 91 200 95"/>
  </g>
  
  <!-- 标签 -->
  <text x="450" y="510" text-anchor="middle" font-family="sans-serif" font-size="18" fill="white" font-weight="bold">美丽的别墅花园</text>
</svg>