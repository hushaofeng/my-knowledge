<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>投硬币模拟器 — 大数定律</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px}
h1{font-size:1.5rem;margin-bottom:4px;color:#a78bfa}
.subtitle{font-size:.85rem;color:#94a3b8;margin-bottom:16px}
.canvas-wrap{background:#1e293b;border-radius:12px;padding:8px;box-shadow:0 4px 24px rgba(0,0,0,.4)}
canvas{display:block;border-radius:8px}
.controls{margin-top:14px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
button{background:#1e3a5f;color:#60a5fa;border:1px solid #334155;border-radius:8px;padding:8px 18px;font-size:.9rem;cursor:pointer;transition:all .2s}
button:hover{background:#2563eb;color:#fff;border-color:#3b82f6}
button.running{background:#7c3aed;color:#fff;border-color:#8b5cf6}
.stats{margin-top:14px;display:flex;gap:16px;flex-wrap:wrap;justify-content:center}
.stat-card{background:#1e293b;border-radius:8px;padding:10px 16px;text-align:center;min-width:100px}
.stat-card .lbl{font-size:.75rem;color:#64748b;margin-bottom:2px}
.stat-card .num{font-size:1.1rem;font-weight:700}
.stat-card .num.heads{color:#4ade80}
.stat-card .num.tails{color:#f87171}
.stat-card .num.ratio{color:#fbbf24}
.preset{margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;justify-content:center;font-size:.8rem}
.preset button{padding:5px 12px;font-size:.8rem}
.insight{margin-top:14px;background:#1e293b;border-radius:8px;padding:12px 20px;max-width:600px;font-size:.85rem;line-height:1.7;color:#94a3b8;text-align:center}
.insight .key{color:#a78bfa;font-weight:700}
.insight .num-hl{color:#fbbf24;font-weight:700}
.coin-display{margin-top:10px;font-size:2rem;min-height:40px}
</style>
</head>
<body>
<h1>🪙 投硬币模拟器（大数定律）</h1>
<p class="subtitle">点100次"投掷"，比讲100道概率题都管用</p>
<div class="canvas-wrap"><canvas id="cv" width="600" height="320"></canvas></div>
<div class="coin-display" id="coinDisp"></div>
<div class="controls">
  <button id="btn1">投 1 次</button>
  <button id="btn10">投 10 次</button>
  <button id="btn100">投 100 次</button>
  <button id="btn1000">投 1000 次</button>
  <button id="btn10k">投 10000 次</button>
  <button id="btnAuto" class="running">⚡ 连续投掷</button>
  <button id="btnReset">🔄 重置</button>
</div>
<div class="stats">
  <div class="stat-card"><div class="lbl">总投掷次数</div><div class="num ratio" id="sTotal">0</div></div>
  <div class="stat-card"><div class="lbl">正面次数</div><div class="num heads" id="sHeads">0</div></div>
  <div class="stat-card"><div class="lbl">反面次数</div><div class="num tails" id="sTails">0</div></div>
  <div class="stat-card"><div class="lbl">正面频率</div><div class="num ratio" id="sRatio">—</div></div>
  <div class="stat-card"><div class="lbl">偏离 0.5</div><div class="num ratio" id="sDev">—</div></div>
</div>
<div class="insight">
  <span class="key">大数定律</span>：当试验次数 <span class="num-hl">n → ∞</span> 时，正面频率趋近于理论概率 <span class="num-hl">0.5</span>。<br>
  投 10 次可能偏离很大，投 10000 次几乎贴近 0.5 —— 这就是概率的"稳定性"。
</div>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const W=600,H=320;
let heads=0,total=0,history=[],autoTimer=null;

function flip(n){
  for(let i=0;i<n;i++){
    total++;
    if(Math.random()<0.5)heads++;
    history.push(heads/total);
  }
  updateStats();
  drawChart();
  // last coin
  const last=history[history.length-1];
  document.getElementById('coinDisp').textContent=total>0?(heads/total>0.5?'🟡':'🔵'):'';
}

function updateStats(){
  document.getElementById('sTotal').textContent=total;
  document.getElementById('sHeads').textContent=heads;
  document.getElementById('sTails').textContent=total-heads;
  document.getElementById('sRatio').textContent=total?`${(heads/total).toFixed(4)} (${(heads/total*100).toFixed(1)}%)`:'—';
  document.getElementById('sDev').textContent=total?`${Math.abs(heads/total-0.5).toFixed(4)}`:'—';
}

function drawChart(){
  ctx.clearRect(0,0,W,H);
  // bg
  ctx.fillStyle='#0f172a';ctx.fillRect(0,0,W,H);
  // grid
  const padL=50,padR=20,padT=30,padB=40;
  const cw=W-padL-padR,ch=H-padT-padB;
  ctx.strokeStyle='#1e293b';ctx.lineWidth=0.5;
  for(let y=0;y<=10;y++){
    const py=padT+ch*y/10;
    ctx.beginPath();ctx.moveTo(padL,py);ctx.lineTo(padL+cw,py);ctx.stroke();
  }
  // y-axis labels
  ctx.fillStyle='#64748b';ctx.font='11px sans-serif';ctx.textAlign='right';
  for(let y=0;y<=10;y+=2){
    const py=padT+ch*y/10;
    ctx.fillText((1-y/10).toFixed(1),padL-6,py+4);
  }
  // x-axis label
  ctx.textAlign='center';ctx.fillText('投掷次数',padL+cw/2,H-4);
  // 0.5 line
  const y05=padT+ch*0.5;
  ctx.strokeStyle='#7c3aed';ctx.lineWidth=1.5;ctx.setLineDash([6,3]);
  ctx.beginPath();ctx.moveTo(padL,y05);ctx.lineTo(padL+cw,y05);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='#7c3aed';ctx.font='12px sans-serif';ctx.textAlign='left';
  ctx.fillText('P=0.5',padL+cw-42,y05-6);
  // data line
  if(history.length>1){
    const n=history.length;
    ctx.strokeStyle='#4ade80';ctx.lineWidth=1.5;ctx.beginPath();
    for(let i=0;i<n;i++){
      const x=padL+i/(n-1)*cw;
      const y=padT+ch*(1-history[i]);
      if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
    }
    ctx.stroke();
    // last point highlight
    const lx=padL+cw,ly=padT+ch*(1-history[n-1]);
    ctx.fillStyle='#fbbf24';ctx.beginPath();ctx.arc(lx,ly,4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fbbf24';ctx.font='11px sans-serif';ctx.textAlign='right';
    ctx.fillText(history[n-1].toFixed(4),lx-8,ly-8);
  }
  // x-axis ticks
  ctx.fillStyle='#64748b';ctx.font='10px sans-serif';ctx.textAlign='center';
  if(history.length>0){
    const ticks=[1,Math.floor(history.length/4),Math.floor(history.length/2),Math.floor(history.length*3/4),history.length];
    ticks.forEach(t=>{
      if(t<=0)return;
      const x=padL+(t-1)/Math.max(history.length-1,1)*cw;
      ctx.fillText(t,x,padT+ch+16);
    });
  }
}

// Buttons
document.getElementById('btn1').onclick=()=>flip(1);
document.getElementById('btn10').onclick=()=>flip(10);
document.getElementById('btn100').onclick=()=>flip(100);
document.getElementById('btn1000').onclick=()=>flip(1000);
document.getElementById('btn10k').onclick=()=>flip(10000);
document.getElementById('btnReset').onclick=()=>{heads=0;total=0;history=[];stopAuto();updateStats();drawChart();document.getElementById('coinDisp').textContent='';};
document.getElementById('btnAuto').onclick=()=>{
  if(autoTimer)stopAuto();else startAuto();
};
function startAuto(){autoTimer=setInterval(()=>flip(1),50);document.getElementById('btnAuto').textContent='⏸ 暂停';}
function stopAuto(){clearInterval(autoTimer);autoTimer=null;document.getElementById('btnAuto').textContent='⚡ 连续投掷';}

drawChart();
</script>
</body>
</html>
